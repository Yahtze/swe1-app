language: python
python:
  - "3.12"

services:
  - postgresql

env:
  global:
    - DJANGO_SETTINGS_MODULE=mysite.settings
    - DATABASE_URL=postgres://postgres@localhost:5432/travis_ci_test

before_install:
  - pip install --upgrade pip
  - pip install --upgrade awscli

install:
  - pip install -r requirements.txt

before_script:
  - psql -c 'create database travis_ci_test;' -U postgres

script:
  - black --check .
  - flake8 .
  - coverage run --source='polls' manage.py test
  - coverage report
  - coveralls

deploy:
  provider: elasticbeanstalk
  edge: true
  access_key_id: $AWS_ACCESS_KEY_ID          # Set in Travis CI environment variables
  secret_access_key: $AWS_SECRET_ACCESS_KEY  # Set in Travis CI environment variables
  region: "us-west-2"                        # Your AWS region
  app: "djangotutorial-dev-v2"                       # Your Elastic Beanstalk application name
  env: "djangotutorial-dev-v2-dev"                       # Your Elastic Beanstalk environment name
  bucket_name: "elasticbeanstalk-us-west-2-908324163690"             # S3 bucket for deployment artifacts
  bucket_path: "djangotutorial-dev-v2"              # Optional: path within the bucket
  on:
    branch: main
  skip_cleanup: true



