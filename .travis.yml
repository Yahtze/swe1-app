language: python
python:
  - "3.12"

services:
  - postgresql

env:
  global:
    - DJANGO_SETTINGS_MODULE=mysite.settings
    - DATABASE_URL=postgres://postgres@localhost:5432/travis_ci_test

before_install:
  - pip install --upgrade pip
  - pip install --upgrade awscli

install:
  - pip install -r requirements.txt

before_script:
  - psql -c 'create database travis_ci_test;' -U postgres

script:
  - black --check .
  - flake8 .
  - coverage run --source='polls' manage.py test
  - coverage report
  - coveralls

deploy:
  provider: script
  script: |
    zip -r app.zip . -x "*.git*"
    aws s3 cp app.zip s3://elasticbeanstalk-us-west-2-908324163690/app.zip --region us-west-2
    aws elasticbeanstalk create-application-version \
        --application-name djangotutorial-dev-v2 \
        --version-label v$TRAVIS_BUILD_NUMBER \
        --source-bundle S3Bucket=elasticbeanstalk-us-west-2-908324163690,S3Key=app.zip \
        --region us-west-2
    aws elasticbeanstalk update-environment \
        --environment-name djangotutorial-dev-v2-dev \
        --version-label v$TRAVIS_BUILD_NUMBER \
        --region us-west-2
  on:
    branch: main



